<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Health Manager</title>
</head>
<body>
    <header>
        <h1>🐾 Puppy Health Manager</h1>
        <nav>
            <ul>
                <li><a href="#health-record">健康档案</a></li>
                <li><a href="#symptom-check">自查与问诊</a></li>
                <li><a href="#appointment">服务预约</a></li>
                <li><a href="#community">互动社区</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="health-record">
            <h2>宠物健康档案</h2>
            <p>管理宠物的健康数据，包括疫苗接种、体检报告和用药记录。</p>
            <button>📋 记录健康数据</button>
        </section>

        <section id="symptom-check">
            <h2>智能症状自查与在线问诊</h2>
            <p>通过AI初步症状筛选，提供就医建议与在线问诊服务。</p>
            <button>💬 开始自查</button>
        </section>

        <section id="appointment">
            <h2>服务预约</h2>
            <p>查看附近宠物医院/诊所，快速预约服务。</p>
            <button>📅 查找医院</button>
        </section>

        <section id="community">
            <h2>互动社区</h2>
            <p>分享养宠日记，提问悬赏，与兽医及创作者互动。</p>
            <button>📢 进入社区</button>
        </section>
    </main>

    <footer>
        <p>© 2026 Puppy Health Manager</p>
    </footer>
</body>
</html>
