<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  <circle cx="150" cy="100" r="60" fill="#fff" opacity="0.15"/>
  <circle cx="1050" cy="300" r="80" fill="#fff" opacity="0.1"/>
  <g transform="translate(600, 200)" filter="url(#shadow)">
    <rect x="-200" y="-80" width="400" height="160" rx="12" fill="#fff" opacity="0.95"/>
    <rect x="-180" y="-60" width="120" height="40" rx="6" fill="#3b82f6" opacity="0.2"/>
    <rect x="-180" y="-10" width="80" height="25" rx="4" fill="#10b981" opacity="0.3"/>
    <rect x="-50" y="-10" width="80" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
    <rect x="80" y="-10" width="80" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
    <rect x="-180" y="30" width="360" height="80" rx="6" fill="#e0f2fe" opacity="0.5"/>
  </g>
  <g transform="translate(200, 320)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#fff" opacity="0.2"/>
    <text x="50" y="35" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">日活用户</text>
  </g>
  <g transform="translate(550, 320)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#fff" opacity="0.2"/>
    <text x="50" y="35" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">问诊转化</text>
  </g>
  <g transform="translate(900, 320)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#fff" opacity="0.2"/>
    <text x="50" y="35" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">档案创建</text>
  </g>
</svg>
